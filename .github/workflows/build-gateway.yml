name: Build Gateway

on:
  push:
    branches: [main]
    paths:
      - 'packages/wechaty-gateway/**'
      - 'packages/wechaty-puppet/**'
      - 'packages/shared/**'
      - '.github/workflows/build-gateway.yml'
  workflow_dispatch:

concurrency: build-gateway

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/wechaty-gateway/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }}-gateway,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=gateway-${{ matrix.arch }}
          cache-to: type=gha,scope=gateway-${{ matrix.arch }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${DIGEST#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: gateway-digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: gateway-digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          IMAGE="ghcr.io/${{ github.repository }}-gateway"
          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " $(ls /tmp/digests/))
